spring.application.name=hrm-backend

# ===== Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/hrm_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=CHANGE_ME_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8080

# ===== JWT =====
# Doi thanh chuoi Base64 rieng (>= 32 ky tu) cho an toan
app.jwt.secret=Y2hhbmdlLW1lLXNlY3JldC1rZXktZm9yLWhybS1zeXN0ZW0tMjAyNi1iYXNlNjQ=
app.jwt.expiration-ms=43200000

# ===== Business defaults =====
app.leave.annual-days=12
app.attendance.check-in-limit=08:15
app.attendance.check-out-limit=17:30
